schema_version: 1
plan_version: 1
phase: Phase1
title: "Phase 1 — Security & Architecture Hardening (post-v17 audit)"
frozen_on: 2026-06-28
source_audit: docs/titanus-audit-v17.md

# Phase 1 closes the remaining P1 items from the v17 forensic audit.
# Each feature is split into batches small enough to be reviewed in one
# ITRB cycle. No batch may touch files outside its declared scope.

features:

  - id: SEC-P1-001
    title: "Cron & webhook auth — finish CRON_SECRET enforcement"
    superseded_by: CRON-P1-004
    rationale: >
      Superseded by CRON-P1-004 which collapses inventory + remediation into
      a single batch. Original two-batch breakdown retained for audit history.
    batches:
      - id: 1
        scope: "Inventory every route under src/routes/api/public/{hooks,monitoring}/* and classify: (a) already protected, (b) intentionally public (e.g. health.quick-check), (c) missing CRON_SECRET."
        output_format: "docs/engineering/reports/SEC-P1-001-batch-1-inventory.md with one table row per route."
        acceptance:
          - "Every file under api/public/hooks and api/public/monitoring appears exactly once."
          - "Each row has a verdict: PROTECTED | PUBLIC_BY_DESIGN | UNPROTECTED."
          - "No source-code changes in this batch."
      - id: 2
        scope: "Apply requireCronAuth() to every route classified UNPROTECTED in batch 1. No other edits."
        output_format: "Per-route diff in docs/engineering/reports/SEC-P1-001-batch-2-fixes.md plus tsgo passing."
        acceptance:
          - "Every route from batch 1 verdict=UNPROTECTED now imports requireCronAuth."
          - "tsgo --noEmit passes."
          - "bun run build passes."

  - id: CRON-P1-004
    title: "Cron Auth Middleware — canonical entry point"
    rationale: >
      Provide a single canonical import path (`@/middleware/cron-auth`) for
      cron authorization across all `/api/public/hooks/*` routes, and verify
      every hook file is guarded. Wraps the existing `verifyCronSecret`
      helper in `@/lib/cron-auth.server` with zero behavior change.
    batches:
      - id: 1
        files:
          - src/middleware/cron-auth.ts (CREATE)
          - src/routes/api/public/hooks/*.ts (AUDIT; UPDATE only where unguarded)
        output_format: "docs/engineering/reports/CRON-P1-004-batch-1-fixes.md"
        acceptance:
          - "src/middleware/cron-auth.ts exports requireCronAuth."
          - "Every file under src/routes/api/public/hooks/** is either guarded by cron-secret, HMAC, or an explicit worker-secret scheme — documented in the report."
          - "tsgo --noEmit passes."
          - "bun run build passes."


  - id: SEC-P1-002
    title: "Server-only import leak audit"
    rationale: >
      TanStack splits *.functions.ts handler bodies into a server-only
      chunk, but top-level imports in those files SHIP TO THE CLIENT.
      Any *.server.ts module reachable from a route or component leaks
      service-role code and inflates the client bundle. The v17 audit
      flagged this as a recurring class of issue without enumerating
      offenders.
    batches:
      - id: 1
        scope: "Enumerate every *.server.ts module that is imported at the top level of a client-reachable file (routes, components, hooks, or *.functions.ts modules). NO source changes."
        output_format: "docs/engineering/reports/SEC-P1-002-batch-1-inventory.md — one row per offending import with: importer file, server-only target, severity, proposed remediation (dynamic-import-in-handler | extract-client-safe-shim | move-to-server-route)."
        acceptance:
          - "Every *.functions.ts file in src/ has been grep-checked for top-level *.server imports."
          - "Each finding has a proposed remediation."
          - "No code edits."
      - id: 2
        scope: |
          Apply `dynamic-import-in-handler` remediation to the 8 files
          listed below — and ONLY these files. For each file: remove the
          top-level `import … from "*.server"` and move it inside every
          `.handler()` body that uses the symbol. Type-only imports stay
          at the top. No formatting drift, no other edits.
        files:
          - src/lib/ai-assistant.functions.ts
          - src/lib/ai-clinical-copilot.functions.ts
          - src/lib/api/example.functions.ts
          - src/lib/pharmacy-intel.functions.ts
          - src/lib/pharmacy-copilot.functions.ts
          - src/lib/products-admin.functions.ts
          - src/lib/vitamin-info.functions.ts
          - src/lib/sentiment.functions.ts
        output_format: "Per-fix diff + tsgo/build evidence in docs/engineering/reports/SEC-P1-002-batch-2-fixes.md."
        acceptance:
          - "Zero top-level *.server imports remain in the 8 files above."
          - "tsgo --noEmit passes."
          - "bun run build passes."
          - "Smoke test of /admin-ai-copilot and /ai-assistant routes still works."

  - id: SEC-P1-003
    title: "RPC GRANT tightening"
    rationale: >
      Audit v17 noted that several public.* RPCs carry EXECUTE grants
      to anon and authenticated that are wider than the policies they
      enforce. Goal: drop unnecessary grants without breaking callers.
    batches:
      - id: 1
        scope: "Produce an inventory of every function in schema public with its current grantees and the call sites that invoke it (server fn vs RPC client vs RLS policy reference)."
        output_format: "docs/engineering/reports/SEC-P1-003-batch-1-inventory.md."
        acceptance:
          - "Every public.<fn> appears with: signature, SECURITY DEFINER/INVOKER, current grantees, call sites, recommended grantees."
          - "No SQL changes."
      - id: 2
        scope: "Emit a single migration that REVOKEs the unnecessary grants and re-asserts the desired ones. Idempotent."
        output_format: "Migration file + docs/engineering/reports/SEC-P1-003-batch-2-fixes.md."
        acceptance:
          - "Migration is idempotent (uses REVOKE then GRANT)."
          - "All admin pages still load post-migration in smoke test."

  - id: AUTH-P1-003
    title: "Auth surface unification — verification only"
    rationale: >
      Confirm `src/routes/auth.tsx` is the single unified email/password
      sign-in + sign-up page (mode toggle, ?redirect= search param, session
      check, redirects to intended target post-auth) and that no duplicate
      auth routes (/login, /signin, /sign-up, /register) exist. No code
      changes. Closed by CTO confirmation on 2026-06-28.
    batches:
      - id: 1
        files: []
        scope: "Inventory the auth surface; produce verification report. NO source edits."
        output_format: "docs/engineering/reports/AUTH-P1-003-batch-1-verification.md"
        acceptance:
          - "src/routes/auth.tsx exists and handles both sign-in and sign-up."
          - "No /login, /signin, /sign-up, or /register route files exist."
          - "AdminGate and _authenticated layout both redirect to /auth."
          - "No source file modified."

  - id: DB-P1-005
    title: "SECURITY DEFINER lockdown — dry-run SQL artifact"
    rationale: >
      Produce a single generic, idempotent SQL artifact that, when
      applied manually via Supabase SQL Editor, revokes EXECUTE from
      PUBLIC and anon for every SECURITY DEFINER function in schema
      public and grants EXECUTE to `authenticated` only. The platform's
      supabase/migrations/ folder is managed by the migration tool and
      cannot accept directly authored files, so the artifact lives
      under docs/engineering/artifacts/ for manual apply + review.
    batches:
      - id: 1
        files:
          - docs/engineering/artifacts/20260628044324_fix_security_definer.sql (CREATE)
        output_format: "docs/engineering/reports/DB-P1-005-batch-1-verification.md"
        acceptance:
          - "Artifact filename matches YYYYMMDDHHMMSS_*.sql."
          - "Single balanced DO $$ ... $$; block iterates pg_proc filtered by nspname='public' AND prosecdef=true AND prokind='f'."
          - "Block emits REVOKE EXECUTE ... FROM PUBLIC, REVOKE EXECUTE ... FROM anon, and GRANT EXECUTE ... TO authenticated per function."
          - "Trailing read-only SELECT reports has_authenticated / has_anon / has_public per function."
          - "No hard-coded function names; idempotent on re-run."
          - "No source-code changes (typecheck/build N/A)."


failure_budget:
  per_batch_consecutive_failures: 3
  on_exhaustion: "Halt phase, file blocker in PROJECT_STATE.blockers, request ITRB intervention."

