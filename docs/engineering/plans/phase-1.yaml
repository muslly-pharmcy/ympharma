schema_version: 1
plan_version: 1
phase: Phase1
title: "Phase 1 — Security & Architecture Hardening (post-v17 audit)"
frozen_on: 2026-06-28
source_audit: docs/titanus-audit-v17.md

# Phase 1 closes the remaining P1 items from the v17 forensic audit.
# Each feature is split into batches small enough to be reviewed in one
# ITRB cycle. No batch may touch files outside its declared scope.

features:

  - id: SEC-P1-001
    title: "Cron & webhook auth — finish CRON_SECRET enforcement"
    rationale: >
      The 2026-06 security batch hardened a subset of /api/public/hooks/*
      and /api/public/monitoring/* endpoints with the CRON_SECRET bearer
      check. Audit v17 confirms the remaining endpoints still accept
      unauthenticated traffic on the published site.
    batches:
      - id: 1
        scope: "Inventory every route under src/routes/api/public/{hooks,monitoring}/* and classify: (a) already protected, (b) intentionally public (e.g. health.quick-check), (c) missing CRON_SECRET."
        output_format: "docs/engineering/reports/SEC-P1-001-batch-1-inventory.md with one table row per route."
        acceptance:
          - "Every file under api/public/hooks and api/public/monitoring appears exactly once."
          - "Each row has a verdict: PROTECTED | PUBLIC_BY_DESIGN | UNPROTECTED."
          - "No source-code changes in this batch."
      - id: 2
        scope: "Apply requireCronAuth() to every route classified UNPROTECTED in batch 1. No other edits."
        output_format: "Per-route diff in docs/engineering/reports/SEC-P1-001-batch-2-fixes.md plus tsgo passing."
        acceptance:
          - "Every route from batch 1 verdict=UNPROTECTED now imports requireCronAuth."
          - "tsgo --noEmit passes."
          - "bun run build passes."

  - id: SEC-P1-002
    title: "Server-only import leak audit"
    rationale: >
      TanStack splits *.functions.ts handler bodies into a server-only
      chunk, but top-level imports in those files SHIP TO THE CLIENT.
      Any *.server.ts module reachable from a route or component leaks
      service-role code and inflates the client bundle. The v17 audit
      flagged this as a recurring class of issue without enumerating
      offenders.
    batches:
      - id: 1
        scope: "Enumerate every *.server.ts module that is imported at the top level of a client-reachable file (routes, components, hooks, or *.functions.ts modules). NO source changes."
        output_format: "docs/engineering/reports/SEC-P1-002-batch-1-inventory.md — one row per offending import with: importer file, server-only target, severity, proposed remediation (dynamic-import-in-handler | extract-client-safe-shim | move-to-server-route)."
        acceptance:
          - "Every *.functions.ts file in src/ has been grep-checked for top-level *.server imports."
          - "Each finding has a proposed remediation."
          - "No code edits."
      - id: 2
        scope: "Apply the remediations approved by ITRB from batch 1, one offender at a time. Each fix is its own commit-equivalent unit."
        output_format: "Per-fix diff + tsgo/build evidence in docs/engineering/reports/SEC-P1-002-batch-2-fixes.md."
        acceptance:
          - "Zero top-level *.server imports remain in client-reachable files."
          - "tsgo --noEmit passes."
          - "bun run build passes."
          - "Smoke test of /admin-ai-copilot and /ai-assistant routes still works."

  - id: SEC-P1-003
    title: "RPC GRANT tightening"
    rationale: >
      Audit v17 noted that several public.* RPCs carry EXECUTE grants
      to anon and authenticated that are wider than the policies they
      enforce. Goal: drop unnecessary grants without breaking callers.
    batches:
      - id: 1
        scope: "Produce an inventory of every function in schema public with its current grantees and the call sites that invoke it (server fn vs RPC client vs RLS policy reference)."
        output_format: "docs/engineering/reports/SEC-P1-003-batch-1-inventory.md."
        acceptance:
          - "Every public.<fn> appears with: signature, SECURITY DEFINER/INVOKER, current grantees, call sites, recommended grantees."
          - "No SQL changes."
      - id: 2
        scope: "Emit a single migration that REVOKEs the unnecessary grants and re-asserts the desired ones. Idempotent."
        output_format: "Migration file + docs/engineering/reports/SEC-P1-003-batch-2-fixes.md."
        acceptance:
          - "Migration is idempotent (uses REVOKE then GRANT)."
          - "All admin pages still load post-migration in smoke test."

failure_budget:
  per_batch_consecutive_failures: 3
  on_exhaustion: "Halt phase, file blocker in PROJECT_STATE.blockers, request ITRB intervention."
