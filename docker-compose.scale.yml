# SCALE-P4-003 — Local horizontal-scale rehearsal.
# Production runs on Cloudflare Workers (auto-scaled). This compose file lets
# engineers replicate a multi-instance topology locally: N app replicas behind
# a round-robin proxy sharing one Postgres. Not used in production.
version: "3.9"
services:
  app:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - .:/app
    command: bun run dev --host 0.0.0.0 --port 8080
    environment:
      - NODE_ENV=production
    deploy:
      replicas: 3
    depends_on:
      - postgres
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: local
      POSTGRES_DB: muslly
    ports:
      - "5433:5432"
  proxy:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./scripts/nginx-scale.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
