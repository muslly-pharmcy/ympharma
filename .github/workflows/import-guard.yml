name: Import Graph Guard (SEC-P1-004)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  import-guard:
    name: Forbid top-level *.server imports in client code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run import-graph guard
        run: bun run scripts/check-imports.ts
